name: Docs

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - 'fix/**'
      - 'feature/**'
      - 'docs/**'

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Build docs site
        run: uvx --python 3.12 --with-requirements docs/requirements.txt mkdocs build --strict
