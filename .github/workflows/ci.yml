name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - 'fix/**'
      - 'feature/**'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Validate shipped example decks
        run: npm run validate:examples

      - name: Build production bundle
        run: npm run build
